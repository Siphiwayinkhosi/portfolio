<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Internal phone application preview</title>
  <desc id="desc">A dark internal calling application with country number selection, keypad, call controls, and recent calls.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#020617"/>
      <stop offset="0.55" stop-color="#05080d"/>
      <stop offset="1" stop-color="#0b1324"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1">
      <stop stop-color="#0b1120"/>
      <stop offset="1" stop-color="#08111c"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="250" height="900" fill="#050914"/>
  <line x1="250" y1="0" x2="250" y2="900" stroke="#1f2a44"/>
  <text x="28" y="44" fill="#e5eefb" font-family="Arial, sans-serif" font-size="24" font-weight="900">Global Dialer</text>
  <text x="28" y="70" fill="#7dd3fc" font-family="Arial, sans-serif" font-size="13">Internal API phone tool</text>
  <g font-family="Arial, sans-serif" font-size="14" font-weight="700">
    <rect x="20" y="112" width="206" height="42" rx="9" fill="#111a2e"/>
    <text x="50" y="139" fill="#fff">Dial pad</text>
    <text x="50" y="193" fill="#94a3b8">Recent calls</text>
    <text x="50" y="237" fill="#94a3b8">Caller IDs</text>
    <text x="50" y="281" fill="#94a3b8">API status</text>
    <text x="50" y="325" fill="#94a3b8">Call logs</text>
  </g>
  <g transform="translate(300 48)" font-family="Arial, sans-serif">
    <text x="0" y="0" fill="#f8fafc" font-size="34" font-weight="900">Internal Phone Application</text>
    <text x="0" y="32" fill="#8ab4f8" font-size="15">Call any number worldwide using a selected country caller ID.</text>
    <g transform="translate(0 70)">
      <rect width="1460" height="510" rx="18" fill="url(#panel)" stroke="#263958"/>
      <text x="24" y="38" fill="#94a3b8" font-size="13" font-weight="800">CALL FROM</text>
      <rect x="24" y="56" width="430" height="48" rx="10" fill="#101827" stroke="#2c4268"/>
      <text x="44" y="87" fill="#e2e8f0" font-size="17" font-weight="800">+1 United States</text>
      <text x="500" y="38" fill="#94a3b8" font-size="13" font-weight="800">CALL TO</text>
      <rect x="500" y="56" width="430" height="48" rx="10" fill="#101827" stroke="#2c4268"/>
      <text x="520" y="87" fill="#e2e8f0" font-size="17" font-weight="800">+268 76374836</text>
      <text x="1180" y="38" fill="#94a3b8" font-size="13" font-weight="800">ROUTE</text>
      <rect x="1180" y="56" width="240" height="48" rx="10" fill="#052e2b" stroke="#0f766e"/>
      <text x="1210" y="87" fill="#5eead4" font-size="17" font-weight="900">API connected</text>
      <g transform="translate(24 130)" font-size="20" fill="#fff" font-weight="900" text-anchor="middle">
        <rect width="1410" height="68" rx="10" fill="#0f172a" stroke="#2b456f"/><text x="705" y="43">1</text>
        <g transform="translate(0 86)"><rect width="450" height="68" rx="10" fill="#0f172a" stroke="#2b456f"/><text x="225" y="43">4</text></g>
        <g transform="translate(480 86)"><rect width="450" height="68" rx="10" fill="#0f172a" stroke="#2b456f"/><text x="225" y="43">5</text></g>
        <g transform="translate(960 86)"><rect width="450" height="68" rx="10" fill="#0f172a" stroke="#2b456f"/><text x="225" y="43">6</text></g>
        <g transform="translate(0 172)"><rect width="450" height="68" rx="10" fill="#0f172a" stroke="#2b456f"/><text x="225" y="43">7</text></g>
        <g transform="translate(480 172)"><rect width="450" height="68" rx="10" fill="#0f172a" stroke="#2b456f"/><text x="225" y="43">8</text></g>
        <g transform="translate(960 172)"><rect width="450" height="68" rx="10" fill="#0f172a" stroke="#2b456f"/><text x="225" y="43">9</text></g>
        <g transform="translate(0 258)"><rect width="450" height="68" rx="10" fill="#0f172a" stroke="#2b456f"/><text x="225" y="43">*</text></g>
        <g transform="translate(480 258)"><rect width="450" height="68" rx="10" fill="#0f172a" stroke="#2b456f"/><text x="225" y="43">0</text></g>
        <g transform="translate(960 258)"><rect width="450" height="68" rx="10" fill="#0f172a" stroke="#2b456f"/><text x="225" y="43">#</text></g>
      </g>
      <text x="24" y="450" fill="#93c5fd" font-size="15">No active call</text>
      <text x="1390" y="450" fill="#bfdbfe" font-size="15">00:00</text>
      <rect x="24" y="478" width="1410" height="52" rx="10" fill="#065f46"/>
      <text x="705" y="511" text-anchor="middle" fill="#d1fae5" font-size="18" font-weight="900">Start Call</text>
    </g>
    <g transform="translate(0 624)">
      <rect width="1460" height="210" rx="18" fill="#070d15" stroke="#263958"/>
      <text x="24" y="44" fill="#f8fafc" font-size="20" font-weight="900">Recent Calls</text>
      <rect x="24" y="72" width="1410" height="44" rx="9" fill="#0f172a" stroke="#2b456f"/>
      <text x="42" y="100" fill="#94a3b8" font-size="14">Search by number, tag or notes...</text>
      <rect x="24" y="138" width="1410" height="52" rx="10" fill="#101827" stroke="#1f2a44"/>
      <text x="42" y="169" fill="#dbeafe" font-size="14" font-weight="800">+26876374836</text>
      <rect x="1320" y="151" width="88" height="26" rx="13" fill="#064e3b" stroke="#10b981"/>
      <text x="1338" y="169" fill="#34d399" font-size="12">completed</text>
    </g>
  </g>
</svg>
