<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">OpenClaw Telegram and Google Drive automation preview</title>
  <desc id="desc">Telegram bot messages showing Google Drive folder creation and calendar scheduling through OpenClaw.</desc>
  <rect width="900" height="520" fill="#09060f"/>
  <g opacity="0.18" stroke="#7c3aed" fill="none">
    <path d="M20 44c46 18 82 8 118-22M140 120c38-34 78-30 124 8M650 70c52-30 104-22 150 24M690 410c46-38 92-36 148 2"/>
    <circle cx="90" cy="390" r="42"/><circle cx="810" cy="165" r="55"/><circle cx="450" cy="280" r="72"/>
  </g>
  <g font-family="Arial, sans-serif">
    <rect x="28" y="28" width="360" height="66" rx="16" fill="#232323"/>
    <text x="50" y="57" fill="#f8fafc" font-size="15" font-weight="800">Hey, Siphiwayinkhosi!</text>
    <text x="50" y="78" fill="#d1d5db" font-size="13">How can I assist you today?</text>
    <rect x="384" y="102" width="420" height="62" rx="16" fill="#6d5bd0"/>
    <text x="406" y="130" fill="#fff" font-size="15">Create a folder in my Google Drive</text>
    <text x="406" y="151" fill="#e9ddff" font-size="15">called OpenClaw Test YP</text>
    <rect x="68" y="174" width="420" height="118" rx="16" fill="#232323"/>
    <text x="92" y="204" fill="#fff" font-size="15" font-weight="800">All set! The folder is now in Drive.</text>
    <text x="92" y="238" fill="#c4b5fd" font-size="14">drive.google.com/drive/folders/...</text>
    <text x="92" y="270" fill="#d1d5db" font-size="14">Let me know if you want anything added.</text>
    <rect x="330" y="306" width="476" height="78" rx="16" fill="#6d5bd0"/>
    <text x="352" y="335" fill="#fff" font-size="15">Create a Google Meet called OpenClaw</text>
    <text x="352" y="356" fill="#e9ddff" font-size="15">and email the invitation.</text>
    <rect x="70" y="394" width="438" height="96" rx="16" fill="#232323"/>
    <text x="94" y="425" fill="#fff" font-size="15" font-weight="800">Google Meet is set for Tuesday 17 March.</text>
    <text x="94" y="452" fill="#d1d5db" font-size="14">Calendar link and invite sent successfully.</text>
    <rect x="376" y="456" width="108" height="22" rx="6" fill="#1f7a3a"/>
    <text x="395" y="472" fill="#bbf7d0" font-size="12" font-weight="800">Google</text>
  </g>
</svg>
