    <text x="58" y="70" fill="#64748b" font-size="12">E 10.00 tracked. Review profit after expenses, not only revenue.</text>
    <text x="58" y="95" fill="#1d4ed8" font-size="13" font-weight="800">Read briefing -></text>
  </g>
  <g transform="translate(520 486)" font-family="Arial, sans-serif">
