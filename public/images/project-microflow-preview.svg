    <text x="565" y="48" fill="#0f172a" font-size="15" font-weight="900">E 10.00</text>
    <rect x="538" y="56" width="70" height="22" rx="6" fill="#bbf7d0"/><text x="552" y="72" fill="#15803d" font-size="12" font-weight="800">completed</text>
