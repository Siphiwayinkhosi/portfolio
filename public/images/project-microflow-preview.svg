    <text x="52" y="154" fill="#9aa5b5">Sales</text>
    <text x="52" y="196" fill="#9aa5b5">Invoices</text>
    <text x="52" y="238" fill="#9aa5b5">Inventory</text>
    <text x="52" y="280" fill="#9aa5b5">Customers</text>
    <text x="52" y="322" fill="#9aa5b5">Team</text>
    <text x="52" y="364" fill="#9aa5b5">Expenses</text>
    <text x="52" y="406" fill="#9aa5b5">Reports</text>
    <text x="52" y="448" fill="#9aa5b5">Help</text>
  </g>
  <line x1="0" y1="792" x2="226" y2="792" stroke="#202938"/>
  <circle cx="29" cy="820" r="5" fill="#22c55e"/>
  <text x="48" y="824" fill="#e5e7eb" font-family="Arial, sans-serif" font-size="13" font-weight="700">Online - tap to sync</text>
  <circle cx="35" cy="862" r="14" fill="#1d4ed8"/>
  <text x="58" y="859" fill="#fff" font-family="Arial, sans-serif" font-size="12" font-weight="800">SIPHIWAYINKHOSI M...</text>
  <text x="58" y="875" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">siphiwayinkhosi.mahlalela...</text>
