      <rect x="56" y="140" width="48" height="48" rx="12" fill="#4f46e5"/><text x="80" y="208">Invoice</text>
      <rect x="196" y="140" width="48" height="48" rx="12" fill="#22c55e"/><text x="220" y="208">New Sale</text>
