<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">MicroFlow dashboard preview</title>
  <desc id="desc">A small shop management dashboard with sales, inventory, quick actions, and offline sync status.</desc>
  <defs>
    <linearGradient id="hero" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#111827"/>
      <stop offset="0.55" stop-color="#151923"/>
      <stop offset="1" stop-color="#ff4f0f"/>
    </linearGradient>
    <linearGradient id="page" x1="0" x2="1">
      <stop stop-color="#f5f2ee"/>
      <stop offset="1" stop-color="#ebe8e2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#111827" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#page)"/>
  <rect width="226" height="900" fill="#0d111a"/>
  <rect x="19" y="20" width="36" height="36" rx="8" fill="#121824"/>
  <text x="67" y="33" fill="#fff" font-family="Arial, sans-serif" font-size="22" font-weight="800" font-style="italic">Micro<tspan fill="#ff5a12">Flow</tspan></text>
  <text x="68" y="53" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11">Siphiwo's store</text>
  <g font-family="Arial, sans-serif" font-size="15" font-weight="700">
    <rect x="12" y="87" width="204" height="39" rx="8" fill="#fff"/>
